name: TaskFlow Release

on:
  push:
    tags:
      - 'v*' # Runs only when you push a version tag

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Lint with Ruff
        run: uv run ruff check .

      # We will keep this commented out until you add your tests folder
      # - name: Run Tests
      #   run: uv run pytest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            pyproject.toml
            uv.lock
